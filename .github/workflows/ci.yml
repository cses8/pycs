name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  security-events: write

jobs:
  backend:
    name: Laravel quality and audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none
      - uses: oven-sh/setup-bun@v2
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Run backend quality gate
        run: bun run quality:check
      - name: Audit Composer dependencies
        run: composer audit --no-ansi

  frontend:
    name: Nuxt quality, build, and audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
      - name: Run frontend quality gate
        run: bun run quality:check
      - name: Build Nuxt
        run: bun run build
      - name: Audit frontend dependencies
        run: bun run audit:security

  sast:
    name: JavaScript CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  semgrep:
    name: PHP and frontend Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/php
            p/typescript
