openapi: 3.1.0
info:
  title: PYCS API
  version: 0.1.0
  description: Starter OpenAPI contract for the Laravel API. Keep this synchronized with route and resource changes.
servers:
  - url: http://localhost:8000/api
paths:
  /announcements:
    get:
      summary: List announcements
      responses:
        "200":
          description: Announcement list
    post:
      summary: Create an announcement
      security:
        - sanctum: []
      responses:
        "201":
          description: Announcement created
        "401":
          description: Unauthenticated
        "422":
          description: Validation error
  /announcements/active:
    get:
      summary: List currently active announcements
      responses:
        "200":
          description: Active announcement list
  /announcements/{announcement}:
    put:
      summary: Update an announcement
      security:
        - sanctum: []
      parameters:
        - $ref: "#/components/parameters/AnnouncementId"
      responses:
        "200":
          description: Announcement updated
        "404":
          description: Announcement not found
    delete:
      summary: Delete an announcement
      security:
        - sanctum: []
      parameters:
        - $ref: "#/components/parameters/AnnouncementId"
      responses:
        "200":
          description: Announcement deleted
        "404":
          description: Announcement not found
  /galleries:
    get:
      summary: List galleries
      responses:
        "200":
          description: Gallery list
    post:
      summary: Create a gallery
      security:
        - sanctum: []
      responses:
        "201":
          description: Gallery created
  /school-calendars:
    get:
      summary: List school calendar events
      responses:
        "200":
          description: Calendar event list
    post:
      summary: Create a school calendar event
      security:
        - sanctum: []
      responses:
        "201":
          description: Calendar event created
  /school-updates:
    get:
      summary: List published school updates
      responses:
        "200":
          description: School update list
    post:
      summary: Create a school update
      security:
        - sanctum: []
      responses:
        "201":
          description: School update created
  /school-updates/{slug}:
    get:
      summary: Show a published school update by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: School update
        "404":
          description: School update not found
components:
  securitySchemes:
    sanctum:
      type: apiKey
      in: cookie
      name: laravel_session
  parameters:
    AnnouncementId:
      name: announcement
      in: path
      required: true
      schema:
        type: integer
  schemas:
    Announcement:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
